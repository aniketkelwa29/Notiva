<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notiva | Edit Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@300,0,0,24" rel="stylesheet">
  <link rel="stylesheet" href="notiva.css">
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script src="notiva-bg.js"></script>
  <script src="reminder.js"></script>
  <style>
    .title-input { width:100%; background:transparent; border:none; outline:none; font-size:clamp(28px,5vw,52px); font-weight:900; letter-spacing:-.04em; color:#fff; font-family:inherit; line-height:1.1; }
    .title-input::placeholder { color:rgba(255,255,255,.12); }
    .save-bar { position:fixed; bottom:0; left:0; right:0; z-index:40; padding:16px 24px; background:linear-gradient(to top,rgba(8,12,24,1) 0%,rgba(8,12,24,.95) 60%,transparent 100%); display:flex; justify-content:center; gap:12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse2 { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  </style>
</head>
<body>
  <div class="n-bg" style="opacity:.55;">
    <div class="n-bg-grid" style="opacity:.5;"></div>
    <div class="n-orb n-orb-1" style="background:radial-gradient(circle,rgba(20,184,166,.3) 0%,transparent 70%);opacity:.25;width:40vw;height:40vw;top:10vh;right:-5vw;left:auto;bottom:auto;filter:blur(110px);animation-delay:-5s;"></div>
    <canvas id="n-canvas"></canvas>
  </div>

  <div id="toast-container"></div>

  <div class="app-layout" style="position:relative;z-index:1;">
    <div class="app-main" style="width:100%;">
      <header class="n-header" style="padding:0 20px;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:12px;">
          <button onclick="window.history.back()" style="display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .2s;" onmouseover="this.style.borderColor='rgba(255,255,255,.15)';this.style.color='#fff'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
            <span class="material-symbols-outlined" style="font-size:17px;">arrow_back</span> Back
          </button>
          <div style="display:flex;align-items:center;gap:7px;">
            <span style="display:inline-flex;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#14B8A6;animation:pulse2 2s ease-in-out infinite;"></span></span>
            <span style="font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#14B8A6;">Editing Note</span>
          </div>
        </div>
        <a href="dashboard.html" style="font-size:22px;font-weight:900;letter-spacing:-.04em;background:linear-gradient(to right,#fff,#c7d2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;">Notiva</a>
        <div style="width:80px;"></div>
      </header>

      <main class="app-scroll" style="padding:36px 24px 110px;">
        <div style="max-width:820px;margin:0 auto;">
          <div class="anim-in">
            <!-- Title -->
            <div style="margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06);">
              <input type="text" id="note-title" class="title-input" placeholder="Note Title…" required>
            </div>

            <!-- Toolbar -->
            <div style="display:flex;justify-content:center;margin-bottom:24px;position:sticky;top:4px;z-index:20;">
              <div class="n-toolbar" style="flex-wrap:wrap;justify-content:center;border-color:rgba(20,184,166,.25);">
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('bold')"><span class="material-symbols-outlined" style="font-size:20px;">format_bold</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('italic')"><span class="material-symbols-outlined" style="font-size:20px;">format_italic</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('underline')"><span class="material-symbols-outlined" style="font-size:20px;">format_underlined</span></button>
                <div class="sep"></div>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('justifyLeft')"><span class="material-symbols-outlined" style="font-size:20px;">format_align_left</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('justifyCenter')"><span class="material-symbols-outlined" style="font-size:20px;">format_align_center</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('justifyRight')"><span class="material-symbols-outlined" style="font-size:20px;">format_align_right</span></button>
                <div class="sep"></div>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('insertUnorderedList')"><span class="material-symbols-outlined" style="font-size:20px;">format_list_bulleted</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('insertOrderedList')"><span class="material-symbols-outlined" style="font-size:20px;">format_list_numbered</span></button>
                <div class="sep"></div>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('formatBlock','H2')" style="font-size:11px;font-weight:800;padding:6px 9px;color:#14B8A6;background:rgba(20,184,166,.1);border-radius:7px;">H2</button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('formatBlock','H3')" style="font-size:11px;font-weight:800;padding:6px 9px;color:var(--muted);background:rgba(255,255,255,.05);border-radius:7px;">H3</button>
                <div class="sep"></div>
                <div style="display:flex;align-items:center;gap:5px;padding:2px 8px;background:rgba(20,184,166,.08);border-radius:8px;border:1px solid rgba(20,184,166,.18);">
                  <span class="material-symbols-outlined" style="font-size:16px;color:#14B8A6;">palette</span>
                  <input type="color" id="colorPicker" value="#14B8A6" oninput="fmt('foreColor',this.value)" style="width:20px;height:20px;background:transparent;border:none;cursor:pointer;border-radius:4px;padding:0;">
                </div>
              </div>
            </div>

            <!-- Reminder Button -->
            <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:20px;">
              <span style="font-size:11px;font-weight:600;color:rgba(245,158,11,.55);letter-spacing:.08em;">Remind me</span>
              <div id="reminder-btn-wrap"></div>
            </div>

            <!-- Editor -->
            <div style="position:relative;min-height:380px;">
              <div style="position:absolute;inset:0;pointer-events:none;opacity:.03;background-image:repeating-linear-gradient(0deg,transparent,transparent 36px,rgba(255,255,255,1) 36px,rgba(255,255,255,1) 37px);"></div>
              <div id="note-content" contenteditable="true" placeholder="Write your note here…" class="n-editor" style="position:relative;z-index:1;"></div>
            </div>
          </div>
        </div>
      </main>

      <div class="save-bar">
        <button id="save-btn" class="btn btn-primary" style="padding:15px 36px;border-radius:16px;font-size:15px;font-family:inherit;flex:1;max-width:360px;background:linear-gradient(135deg,#14B8A6,#0d9488,#0f766e);box-shadow:0 0 22px rgba(20,184,166,.3);">
          <span class="material-symbols-outlined" style="font-size:20px;">cloud_sync</span>
          <span id="save-txt">Save Updates</span>
        </button>
        <button onclick="window.history.back()" class="btn btn-ghost" style="padding:15px 24px;border-radius:16px;font-size:15px;font-family:inherit;">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    requireAuth();
    initParticles('n-canvas');

    function fmt(cmd, val=null) {
      document.execCommand(cmd, false, val);
      document.getElementById('note-content').focus();
    }

    const noteId = new URLSearchParams(window.location.search).get('id');

    // Init reminder button with noteId
    const _remWrap = document.getElementById('reminder-btn-wrap');
    if (_remWrap && noteId) _remWrap.appendChild(createReminderButton(noteId, ''));

    async function loadNote() {
      try {
        const notes = await api.getNotes() || [];
        const arr = Array.isArray(notes) ? notes : [];
        const note = arr.find(n => String(n.id) === String(noteId));
        if (!note) {
          showToast("Note not found.",'error');
          setTimeout(() => window.location.href='notes.html', 1500);
          return;
        }
        window.currentNote = note;
        document.getElementById('note-title').value = note.title || '';
        document.getElementById('note-content').innerHTML = note.content || '';
        // Sync reminder button with loaded title
        window._reminderNoteTitle = note.title || '';
        updateReminderBtn(noteId);
      } catch(_) {
        showToast('Error loading note.','error');
      }
    }
    loadNote();

    document.getElementById('save-btn').addEventListener('click', async () => {
      const title = document.getElementById('note-title').value.trim();
      const content = document.getElementById('note-content').innerHTML;
      const text = document.getElementById('note-content').textContent.trim();
      if (!title || !text) { showToast('Title and content are required.','error'); return; }
      if (!window.currentNote) return;

      const btn = document.getElementById('save-btn');
      const txt = document.getElementById('save-txt');
      btn.disabled = true;
      btn.querySelector('.material-symbols-outlined').style.animation='spin 1s linear infinite';
      txt.textContent = 'Saving…';

      try {
        await api.updateNote({ ...window.currentNote, title, content });
        showToast('Note updated! ✅','success');
        setTimeout(() => window.location.href='notes.html', 900);
      } catch(err) {
        showToast('Failed to update note.','error');
        btn.disabled = false;
        btn.querySelector('.material-symbols-outlined').style.animation='';
        txt.textContent='Save Updates';
      }
    });
  </script>
</body>
</html>
