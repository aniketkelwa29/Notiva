<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notiva | Login</title>
  <meta name="description" content="Log in to Notiva — your intelligent, secure notes companion.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@300,0,0,24" rel="stylesheet">
  <link rel="stylesheet" href="notiva.css">
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script src="notiva-bg.js"></script>
  <style>
    .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; z-index:1; }
    .auth-card  { width:100%; max-width:420px; }
    .logo-ring  { width:68px; height:68px; border-radius:20px; background:linear-gradient(135deg,#818CF8,#6366F1,#4338CA); display:flex; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(99,102,241,.45),0 0 80px rgba(99,102,241,.15); border:1px solid rgba(255,255,255,.12); position:relative; overflow:hidden; margin:0 auto 20px; }
    .logo-ring::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,.1); border-radius:inherit; animation:pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.1} 50%{opacity:.25} }
    .brand-name { font-size:38px; font-weight:900; letter-spacing:-.04em; background:linear-gradient(to right,#fff,#c7d2fe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:block; text-align:center; }
    .brand-sub  { font-size:11px; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:#6366F1; opacity:.8; display:block; text-align:center; margin-top:6px; }
    .pw-eye { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--dim); transition:color .2s; padding:0; display:flex; align-items:center; }
    .pw-eye:hover { color:var(--primary); }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="n-bg">
    <div class="n-bg-grid"></div>
    <div class="n-orb n-orb-1"></div>
    <div class="n-orb n-orb-2"></div>
    <div class="n-orb n-orb-3"></div>
    <div class="n-stars">
      <div class="n-star" style="--t:12%;--l:8%;--d:6s;--dl:0s"></div>
      <div class="n-star" style="--t:38%;--l:28%;--d:8s;--dl:2s"></div>
      <div class="n-star" style="--t:68%;--l:60%;--d:7s;--dl:4s"></div>
      <div class="n-star" style="--t:22%;--l:72%;--d:9s;--dl:1s"></div>
      <div class="n-star" style="--t:55%;--l:5%;--d:6.5s;--dl:3s"></div>
    </div>
    <canvas id="n-canvas"></canvas>
  </div>

  <div id="toast-container"></div>

  <div class="auth-wrap">
    <div class="auth-card anim-in">

      <!-- Brand -->
      <div style="text-align:center;margin-bottom:36px;">
        <div class="logo-ring">
          <span class="material-symbols-outlined" style="font-size:30px;color:#fff;position:relative;z-index:1;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">auto_awesome</span>
        </div>
        <span class="brand-name">Notiva</span>
        <span class="brand-sub">Your Intelligent Notes</span>
      </div>

      <!-- Card -->
      <div class="glass" style="border-radius:22px;padding:36px 32px;">
        <h2 style="font-size:20px;font-weight:800;color:#fff;margin-bottom:6px;">Welcome back 👋</h2>
        <p style="font-size:13.5px;color:var(--muted);margin-bottom:28px;">Sign in to continue to your workspace.</p>

        <form id="login-form" novalidate>

          <!-- Username -->
          <div style="margin-bottom:18px;">
            <label class="n-label" for="username">Username</label>
            <div style="position:relative;">
              <span class="material-symbols-outlined" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(99,102,241,.55);font-size:20px;transition:color .2s;" id="user-icon">person</span>
              <input type="text" id="username" autocomplete="username" required
                class="glass-input" placeholder="your_username"
                style="width:100%;border-radius:13px;padding:14px 14px 14px 46px;font-size:14px;font-family:inherit;">
            </div>
          </div>

          <!-- Password -->
          <div style="margin-bottom:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <label class="n-label" style="margin-bottom:0;">Password</label>
              <a href="#" style="font-size:11px;color:var(--primary);font-weight:600;text-decoration:none;letter-spacing:.04em;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--primary)'">Forgot?</a>
            </div>
            <div style="position:relative;">
              <span class="material-symbols-outlined" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(99,102,241,.55);font-size:20px;">lock</span>
              <input type="password" id="password" autocomplete="current-password" required
                class="glass-input" placeholder="••••••••"
                style="width:100%;border-radius:13px;padding:14px 46px 14px 46px;font-size:14px;font-family:inherit;">
              <button type="button" class="pw-eye" id="pw-toggle" aria-label="Show/hide password">
                <span class="material-symbols-outlined" id="pw-eye" style="font-size:20px;">visibility</span>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;padding:15px;border-radius:13px;font-size:15px;letter-spacing:.02em;">
            <span id="login-btn-inner" class="btn-inner" style="display:flex;align-items:center;gap:8px;">
              Log In <span class="material-symbols-outlined" style="font-size:18px;" id="login-arrow">arrow_forward</span>
            </span>
          </button>
        </form>

        <div class="n-divider" style="margin:24px 0 20px;">or</div>
        <p style="text-align:center;font-size:14px;color:var(--muted);">
          New to Notiva?
          <a href="signup.html" style="color:var(--primary);font-weight:700;text-decoration:none;margin-left:4px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--primary)'">Create an Account</a>
        </p>
      </div>

      <p style="text-align:center;font-size:11px;color:#374151;margin-top:24px;">© 2025 Notiva · All rights reserved</p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (api.getToken()) window.location.href = 'dashboard.html';

    // Particles
    initParticles('n-canvas');

    // Password toggle
    document.getElementById('pw-toggle').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const eye = document.getElementById('pw-eye');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      eye.textContent = inp.type === 'password' ? 'visibility' : 'visibility_off';
    });

    // Focus icon color
    document.getElementById('username').addEventListener('focus', () => document.getElementById('user-icon').style.color = '#6366F1');
    document.getElementById('username').addEventListener('blur',  () => document.getElementById('user-icon').style.color = 'rgba(99,102,241,.55)');

    // Translate raw backend errors into user-friendly messages
    function _friendlyLoginError(error) {
      const raw = (error.message || '').toLowerCase();

      // Backend throws NullPointerException when user doesn't exist
      if (raw.includes('user is null') || raw.includes('nullpointer') || raw.includes('cannot invoke')) {
        return 'No account found with that username.<br><span style="font-size:12px;opacity:.7">Double-check your username or <a href="signup.html" style="color:#818CF8;text-decoration:none;font-weight:700;">create a new account</a>.</span>';
      }

      // Wrong password / unauthorized
      if (raw.includes('401') || raw.includes('unauthorized') || raw.includes('invalid password') || raw.includes('wrong password') || raw.includes('bad credentials')) {
        return 'Incorrect password.<br><span style="font-size:12px;opacity:.7">Please re-enter your password carefully.</span>';
      }

      // Network / server down
      if (raw.includes('failed to fetch') || raw.includes('networkerror') || raw.includes('network') || raw.includes('500')) {
        return 'Unable to reach the server.<br><span style="font-size:12px;opacity:.7">Check your connection and try again.</span>';
      }

      // Generic fallback — still clean, no Java stack trace
      return 'Please enter valid credentials to log in.<br><span style="font-size:12px;opacity:.7">Username or password may be incorrect.</span>';
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const pw = document.getElementById('password').value;

      if (!username || !pw) { showToast('Please enter your username and password.', 'warning', '⚠️ Fields Required'); return; }

      const btn = document.getElementById('login-btn');
      const inner = document.getElementById('login-btn-inner');
      btn.disabled = true;
      inner.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;animation:spin 1s linear infinite">progress_activity</span> Signing in…';

      try {
        const res = await api.login(username, pw);
        if (res && res.token) {
          api.setToken(res.token);
          showToast('Redirecting you to your workspace…', 'success', '🎉 Welcome Back!');
          try {
            const user = await api.getUser();
            if (user) NotivaState.user = { id: user.id || user.userName, name: user.userName, email: user.email };
          } catch (_) {}
          sessionStorage.setItem('notiva_just_logged_in', '1');
          setTimeout(() => window.location.href = 'dashboard.html', 1100);
        }
      } catch (error) {
        btn.disabled = false;
        inner.innerHTML = 'Log In <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>';
        showLoginError(_friendlyLoginError(error));
      }
    });

    // Spin animation for loader
    const s = document.createElement('style');
    s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(s);
  </script>
</body>
</html>
