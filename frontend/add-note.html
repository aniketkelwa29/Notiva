<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notiva | Add Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@300,0,0,24" rel="stylesheet">
  <link rel="stylesheet" href="notiva.css">
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script src="notiva-bg.js"></script>
  <script src="reminder.js"></script>
  <style>
    .title-input {
      width:100%; background:transparent; border:none; outline:none;
      font-size:clamp(28px,5vw,52px); font-weight:900; letter-spacing:-.04em;
      color:#fff; font-family:inherit; line-height:1.1;
    }
    .title-input::placeholder { color:rgba(255,255,255,.12); }
    .save-bar {
      position:fixed; bottom:0; left:0; right:0; z-index:40;
      padding:16px 24px;
      background:linear-gradient(to top,rgba(8,12,24,1) 0%,rgba(8,12,24,.95) 60%,transparent 100%);
      display:flex; justify-content:center;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media(min-width:1024px) { .lg-hidden { display:none!important; } }
  </style>
</head>
<body>
  <div class="n-bg" style="opacity:.6;">
    <div class="n-bg-grid" style="opacity:.6;"></div>
    <div class="n-orb n-orb-1" style="opacity:.2;width:40vw;height:40vw;top:20vh;left:30vw;filter:blur(120px);"></div>
    <canvas id="n-canvas"></canvas>
  </div>

  <div id="toast-container"></div>

  <div class="app-layout" style="position:relative;z-index:1;">
    <div class="app-main" style="width:100%;">
      <header class="n-header" style="padding:0 20px;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:12px;">
          <button onclick="window.history.back()" style="display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .2s;" onmouseover="this.style.borderColor='rgba(255,255,255,.15)';this.style.color='#fff'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
            <span class="material-symbols-outlined" style="font-size:17px;">arrow_back</span> Back
          </button>
          <div style="display:flex;align-items:center;gap:7px;">
            <span style="display:inline-flex;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse2 2s ease-in-out infinite;"></span></span>
            <span style="font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);">New Note</span>
          </div>
        </div>
        <a href="dashboard.html" style="font-size:22px;font-weight:900;letter-spacing:-.04em;background:linear-gradient(to right,#fff,#c7d2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;">Notiva</a>
        <div style="width:80px;"></div>
      </header>

      <main class="app-scroll" style="padding:36px 24px 100px;">
        <div style="max-width:820px;margin:0 auto;">
          <form id="add-form" class="anim-in">
            <!-- Title -->
            <div style="margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06);">
              <input type="text" id="note-title" class="title-input" placeholder="Note Title…" autofocus required>
            </div>

            <!-- Toolbar -->
            <div style="display:flex;justify-content:center;margin-bottom:24px;position:sticky;top:4px;z-index:20;">
              <div class="n-toolbar" style="flex-wrap:wrap;justify-content:center;">
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('bold')" title="Bold"><span class="material-symbols-outlined" style="font-size:20px;">format_bold</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('italic')" title="Italic"><span class="material-symbols-outlined" style="font-size:20px;">format_italic</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('underline')" title="Underline"><span class="material-symbols-outlined" style="font-size:20px;">format_underlined</span></button>
                <div class="sep"></div>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('justifyLeft')" title="Left"><span class="material-symbols-outlined" style="font-size:20px;">format_align_left</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('justifyCenter')" title="Center"><span class="material-symbols-outlined" style="font-size:20px;">format_align_center</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('justifyRight')" title="Right"><span class="material-symbols-outlined" style="font-size:20px;">format_align_right</span></button>
                <div class="sep"></div>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('insertUnorderedList')" title="Bullets"><span class="material-symbols-outlined" style="font-size:20px;">format_list_bulleted</span></button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('insertOrderedList')" title="Numbered"><span class="material-symbols-outlined" style="font-size:20px;">format_list_numbered</span></button>
                <div class="sep"></div>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('formatBlock','H2')" title="H2" style="font-size:11px;font-weight:800;padding:6px 9px;color:var(--primary);background:rgba(99,102,241,.1);border-radius:7px;">H2</button>
                <button type="button" onmousedown="event.preventDefault()" onclick="fmt('formatBlock','H3')" title="H3" style="font-size:11px;font-weight:800;padding:6px 9px;color:var(--muted);background:rgba(255,255,255,.05);border-radius:7px;">H3</button>
                <div class="sep"></div>
                <div style="display:flex;align-items:center;gap:5px;padding:2px 8px;background:rgba(255,255,255,.04);border-radius:8px;">
                  <span class="material-symbols-outlined" style="font-size:16px;color:var(--primary);">palette</span>
                  <input type="color" id="colorPicker" value="#6366F1" title="Text Color" oninput="fmt('foreColor',this.value)" style="width:20px;height:20px;background:transparent;border:none;cursor:pointer;border-radius:4px;padding:0;">
                </div>
              </div>
            </div>

            <!-- Reminder Button -->
            <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:20px;">
              <span style="font-size:11px;font-weight:600;color:rgba(245,158,11,.55);letter-spacing:.08em;">Remind me</span>
              <div id="reminder-btn-wrap"></div>
            </div>

            <!-- Editor -->
            <div style="position:relative;min-height:380px;">
              <div style="position:absolute;inset:0;pointer-events:none;opacity:.04;background-image:repeating-linear-gradient(0deg,transparent,transparent 36px,rgba(255,255,255,1) 36px,rgba(255,255,255,1) 37px);"></div>
              <div id="note-content" contenteditable="true" placeholder="Start writing your note here…" class="n-editor" style="position:relative;z-index:1;"></div>
            </div>
          </form>
        </div>
      </main>

      <div class="save-bar">
        <button id="save-btn" class="btn btn-primary" style="padding:15px 36px;border-radius:16px;font-size:15px;font-family:inherit;width:100%;max-width:480px;">
          <span class="material-symbols-outlined" style="font-size:20px;">save</span>
          <span id="save-txt">Save Note</span>
        </button>
      </div>
    </div>
  </div>

  <style>
    @keyframes pulse2 { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  </style>

  <script>
    requireAuth();
    initParticles('n-canvas');

    // Reminder: use temp ID for new notes (replaced on save)
    let _remNoteId = 'new_' + Date.now();
    const _remWrap = document.getElementById('reminder-btn-wrap');
    _remWrap.appendChild(createReminderButton(_remNoteId, ''));

    function fmt(cmd, val=null) {
      document.execCommand(cmd, false, val);
      document.getElementById('note-content').focus();
    }

    document.getElementById('save-btn').addEventListener('click', async () => {
      const title = document.getElementById('note-title').value.trim();
      const content = document.getElementById('note-content').innerHTML;
      const text = document.getElementById('note-content').textContent.trim();

      if (!title || !text) { showToast('Title and content are both required.','error'); return; }

      const btn = document.getElementById('save-btn');
      const txt = document.getElementById('save-txt');
      btn.disabled = true;
      btn.querySelector('.material-symbols-outlined').style.animation = 'spin 1s linear infinite';
      txt.textContent = 'Saving…';

      try {
        await api.createNote({ title, content, userId: NotivaState.user.id || NotivaState.user.userName || 'unknown' });
        showToast('Note saved successfully! 🎉','success');
        setTimeout(() => window.location.href = 'notes.html', 900);
      } catch(err) {
        showToast('Failed to save note. Please try again.','error');
        btn.disabled = false;
        btn.querySelector('.material-symbols-outlined').style.animation = '';
        txt.textContent = 'Save Note';
      }
    });
  </script>
</body>
</html>
